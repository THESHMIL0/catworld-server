<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Private Chat ❤️</title>
    <style>
        :root {
            --primary-color: #FFB6C1; /* TulipPink */
            --bg-color: #FFF5F7;
            --chat-bg: #FFFFFF;
            --me-bubble: #FFB6C1;
            --other-bubble: #F1F1F1;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: var(--chat-bg);
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        .header {
            padding: 15px;
            background: white;
            text-align: center;
            border-bottom: 1px solid #eee;
            color: var(--primary-color);
            font-weight: bold;
            font-size: 1.2rem;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bubble {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
        }

        .bubble.me {
            align-self: flex-end;
            background-color: var(--me-bubble);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bubble.other {
            align-self: flex-start;
            background-color: var(--other-bubble);
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .time {
            font-size: 0.7rem;
            margin-top: 4px;
            opacity: 0.7;
            text-align: right;
        }

        .input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            border: 1px solid #ddd;
            padding: 10px 15px;
            border-radius: 25px;
            outline: none;
            font-size: 1rem;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        button {
            background: var(--primary-color);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">Our Chat ✨</div>
        <div id="messages">
            <!-- Messages will appear here -->
        </div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
            <button onclick="sendMessage()">➔</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const input = document.getElementById('messageInput');

        // This would be replaced by your real username logic
        let currentUser = "Thesh";

        async function loadMessages() {
            try {
                const response = await fetch('/api/messages');
                const messages = await response.json();
                messagesDiv.innerHTML = '';
                messages.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = `bubble ${msg.sender === currentUser ? 'me' : 'other'}`;
                    div.innerHTML = `
                        <div>${msg.text}</div>
                        <div class="time">${new Date(msg.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                    `;
                    messagesDiv.appendChild(div);
                });
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            } catch (e) { console.error(e); }
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            try {
                await fetch('/api/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sender: currentUser, text: text })
                });
                input.value = '';
                loadMessages();
            } catch (e) { console.error(e); }
        }

        input.addEventListener("keypress", (event) => {
            if (event.key === "Enter") {
                sendMessage();
            }
        });

        // Poll for new messages every 3 seconds
        setInterval(loadMessages, 3000);
        loadMessages();
    </script>
</body>
</html>
